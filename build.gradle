plugins {
    id 'java'
    id 'application'
    id("org.javamodularity.moduleplugin") version "2.0.0"
    id("org.openjfx.javafxplugin") version "0.1.0"
    id("com.gradleup.shadow") version "9.4.0"
    id("com.netflix.nebula.ospackage") version "12.1.1"
}
repositories {
    mavenCentral()
}
group = 'com.awesomeshot5051'
version = '1.0-SNAPSHOT'

dependencies {
    // Core JavaFX modules
    implementation 'org.openjfx:javafx-controls:21.0.1'
    implementation 'org.openjfx:javafx-fxml:21.0.1'
    implementation 'org.openjfx:javafx-graphics:21.0.2'

    // ControlsFX - Optional, but useful if you want AutoComplete or Popovers
    implementation 'org.controlsfx:controlsfx:11.2.3'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
}
javafx {
    version = "25"
    modules = ['javafx.controls', 'javafx.fxml']
}

application {
    mainClass.set('com.awesomeshot5051.Launcher')
    applicationDefaultJvmArgs = [
            "--enable-native-access=javafx.graphics",
    ]
    applicationDefaultJvmArgs += ["--enable-native-access=ALL-UNNAMED"]
}